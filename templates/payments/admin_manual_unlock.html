{% extends 'base.html' %}

{% block title %}Manual Unlock - GovtExamWala{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-3xl mx-auto bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h1 class="text-2xl font-bold mb-4">Manual Payment Review</h1>
        <div class="space-y-2 mb-6">
            <p><strong>User:</strong> {{ transaction.user.email }}</p>
            <p><strong>Item:</strong> {{ item.name }}</p>
            <p><strong>Amount:</strong> ₹{{ transaction.amount }}</p>
            <p><strong>Status:</strong> {{ transaction.status }}</p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <textarea name="admin_notes" rows="4" class="w-full border rounded-lg p-3" placeholder="Admin notes">{{ transaction.admin_notes }}</textarea>
            <div class="flex gap-3">
                <button type="submit" name="action" value="unlock" class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700">Unlock</button>
                <button type="submit" name="action" value="reject" class="bg-red-600 text-white px-5 py-2 rounded-lg hover:bg-red-700">Reject</button>
                <a href="{% url 'payments:admin_payments' %}" class="px-5 py-2 rounded-lg bg-gray-200 hover:bg-gray-300">Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
