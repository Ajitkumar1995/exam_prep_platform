{% extends "admin/login.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* Full page gradient background */
    body.login {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        min-height: 100vh !important;
        margin: 0 !important;
        padding: 20px !important;
    }
    
    /* Login container */
    .login #container {
        background: white !important;
        border-radius: 20px !important;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3) !important;
        padding: 0 !important;
        max-width: 420px !important;
        width: 100% !important;
        margin: 0 !important;
        animation: slideUp 0.5s ease-out !important;
        overflow: hidden !important;
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    /* Header with Gradient Background */
    .login-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
        padding: 30px 30px 25px 30px !important;
        text-align: center !important;
        border-bottom: none !important;
    }
    
    .login-header h1 {
        color: white !important;
        font-size: 28px !important;
        font-weight: 700 !important;
        text-shadow: 0 2px 4px rgba(0,0,0,0.2) !important;
        margin: 0 !important;
    }
    
    .login-header h1:before {
        content: "📚 ";
    }
    
    .login-header .subtitle {
        color: rgba(255,255,255,0.9) !important;
        font-size: 14px !important;
        margin-top: 5px !important;
        display: block !important;
        font-weight: 400 !important;
        letter-spacing: 0.5px !important;
    }
    
    /* Hide default header */
    .login #header {
        display: none !important;
    }
    
    /* Content area */
    .login #content {
        padding: 30px 30px 20px 30px !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        background: transparent !important;
    }
    
    /* Form rows */
    .login .form-row {
        padding: 12px 0 !important;
        border-bottom: none !important;
    }
    
    .login .form-row label {
        color: #333 !important;
        font-weight: 600 !important;
        font-size: 14px !important;
        display: block !important;
        margin-bottom: 5px !important;
    }
    
    .login .form-row input {
        border: 2px solid #e0e0e0 !important;
        border-radius: 10px !important;
        padding: 12px 15px !important;
        font-size: 15px !important;
        transition: all 0.3s !important;
        width: 100% !important;
        box-sizing: border-box !important;
        background: #f8f9fa !important;
    }
    
    .login .form-row input:focus {
        border-color: #667eea !important;
        outline: none !important;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15) !important;
        background: white !important;
    }
    
    /* Submit button */
    .login .submit-row {
        padding: 20px 0 0 0 !important;
        border: none !important;
        background: transparent !important;
        text-align: center !important;
    }
    
    .login .submit-row input {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
        border: none !important;
        padding: 14px 30px !important;
        border-radius: 10px !important;
        font-size: 17px !important;
        font-weight: 700 !important;
        width: 100% !important;
        color: white !important;
        cursor: pointer !important;
        transition: all 0.3s !important;
        letter-spacing: 0.5px !important;
    }
    
    .login .submit-row input:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4) !important;
    }
    
    .login .submit-row input:active {
        transform: scale(0.98) !important;
    }
    
    /* Error messages */
    .login .errornote {
        background: #fef2f2 !important;
        border-left: 4px solid #ef4444 !important;
        border-radius: 8px !important;
        padding: 12px 15px !important;
        color: #991b1b !important;
        margin-bottom: 15px !important;
        font-weight: 500 !important;
    }
    
    /* Password reset link */
    .login .password-reset-link {
        text-align: center !important;
        padding-top: 15px !important;
    }
    
    .login .password-reset-link a {
        color: #667eea !important;
        text-decoration: none !important;
        font-weight: 500 !important;
        font-size: 14px !important;
        transition: color 0.3s !important;
    }
    
    .login .password-reset-link a:hover {
        color: #4F46E5 !important;
        text-decoration: underline !important;
    }
    
    /* Footer */
    .login-footer {
        text-align: center !important;
        padding: 15px 30px 20px 30px !important;
        border-top: 1px solid #f0f0f0 !important;
        color: #999 !important;
        font-size: 12px !important;
        background: #fafafa !important;
    }
    
    /* Hide default footer if any */
    .login #footer {
        display: none !important;
    }
    
    /* Responsive */
    @media (max-width: 480px) {
        .login #content {
            padding: 20px !important;
        }
        
        .login-header {
            padding: 20px !important;
        }
        
        .login-header h1 {
            font-size: 22px !important;
        }
        
        .login-footer {
            padding: 12px 20px 15px 20px !important;
        }
    }
</style>
{% endblock %}

{% block content %}
<!-- Custom Header -->
<div class="login-header">
    <h1>GovtExamWala Admin</h1>
    <span class="subtitle">🔐 Secure Admin Access</span>
</div>

<!-- Original login form -->
{{ block.super }}

<!-- Custom Footer -->
<div class="login-footer">
    © 2024 GovtExamWala - Your Government Exam Partner 🎯
</div>
{% endblock %}
