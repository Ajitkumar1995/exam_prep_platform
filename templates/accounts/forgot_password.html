{% extends 'base.html' %}
{% load static %}

{% block title %}Forgot Password - GovtExamWala{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-purple-600 via-blue-600 to-indigo-700 py-12 px-4">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-key text-4xl text-purple-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Forgot Password?</h2>
                <p class="text-gray-600 mt-2">Enter your email address and we'll send you a link to reset your password.</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-6">
                    <input type="email" name="email" placeholder="Email Address" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg font-semibold hover:from-purple-700 hover:to-indigo-700 transition">
                    Send Reset Link
                </button>
            </form>
            
            <div class="text-center mt-6">
                <a href="{% url 'accounts:login_signup' %}" class="text-purple-600 hover:text-purple-700">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
