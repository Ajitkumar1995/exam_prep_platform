{% extends 'base.html' %}
{% load static %}

{% block title %}Change Password - GovtExamWala{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-purple-600 via-blue-600 to-indigo-700 py-12 px-4">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-key text-4xl text-purple-600"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Change Password</h2>
                <p class="text-gray-600 mt-2">Update your account password</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Email</label>
                    <input type="email" value="{{ user.email }}" disabled
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-gray-100">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Current Password</label>
                    <input type="password" name="current_password" placeholder="Enter current password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">New Password</label>
                    <input type="password" name="new_password" placeholder="Enter new password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <p class="text-xs text-gray-500 mt-1">Password must be at least 6 characters</p>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">Confirm New Password</label>
                    <input type="password" name="confirm_password" placeholder="Confirm new password" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 rounded-lg font-semibold hover:from-purple-700 hover:to-indigo-700 transition">
                    Change Password
                </button>
            </form>
            
            <div class="mt-4 text-center">
                <a href="{% url 'accounts:profile' %}" class="text-sm text-purple-600 hover:text-purple-700">
                    ← Back to Profile
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
