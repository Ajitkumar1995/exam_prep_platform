{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-8">Exam Categories</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for category in categories %}
        <a href="{% url 'exams:category_detail' category.slug %}" 
           class="bg-white rounded-lg shadow-lg p-6 hover:shadow-xl transition transform hover:-translate-y-1">
            <div class="text-center">
                <i class="fas {{ category.icon }} text-5xl text-purple-600 mb-4"></i>
                <h3 class="text-xl font-bold mb-2">{{ category.name }}</h3>
                <p class="text-gray-600">{{ category.description|truncatewords:20 }}</p>
            </div>
        </a>
        {% empty %}
        <p class="col-span-3 text-center text-gray-500">No categories available yet.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
