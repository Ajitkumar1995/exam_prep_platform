version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: exam_prep
      POSTGRES_USER: exam_user
      POSTGRES_PASSWORD: exam_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: gunicorn exam_prep.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class gevent
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  celery:
    build: .
    command: celery -A exam_prep worker -l info --concurrency=4
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  celery-beat:
    build: .
    command: celery -A exam_prep beat -l info
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: